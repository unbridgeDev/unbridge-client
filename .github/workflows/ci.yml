name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  program:
    name: distin — on-chain program (fmt + check + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: program-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  kobe-frost:
    name: kobe — FROST Ed25519 (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine/kobe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/kobe/target
          key: kobe-${{ runner.os }}-${{ hashFiles('engine/kobe/Cargo.lock') }}

      - name: Build
        run: cargo build --lib

      - name: Threshold-signature tests
        run: cargo test --lib --tests

  kobe-ecdsa:
    name: kobe-ecdsa — GG20 secp256k1 (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine/kobe-ecdsa
    env:
      CGO_LDFLAGS: -L${{ github.workspace }}/engine/kobe/target/release -lkobe
      LD_LIBRARY_PATH: ${{ github.workspace }}/engine/kobe/target/release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/kobe/target
          key: kobe-release-${{ runner.os }}-${{ hashFiles('engine/kobe/Cargo.lock') }}

      - name: Build libkobe (FROST cdylib for cgo)
        run: cargo build --release
        working-directory: engine/kobe

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: engine/kobe-ecdsa/go.sum

      - name: Build
        run: go build ./...

      - name: Test (short mode skips slow safe-prime DKG)
        run: go test -short -timeout 600s ./...

  secret-scan:
    name: gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
